<html>
<head>
<title>Responsive Image Slide Show using jQuery
</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="responsiveslides.css">
<link rel="stylesheet" href="style.css">
<script src="https://code.jquery.com/jquery-1.12.4.js"></script>
<script src="responsiveslides.min"></script>
<script>
$(function ()
{ $("#slider").responsiveSlides
({
auto: true,
pager: false,
nav: true,
speed: 300,
namespace: "slider-callback",
maxwidth: "550px"
));
});
</script>
</head>
<body>
<div id="wrapper">
<div class="responsive-slider">
<ul class="rslides" id="slider">
<li>
<img src="Spirit-1.jpg" alt="">
<p class="caption">Chocolate Milkshake with Ice Cream</p>
</li>
<li>
<img src="siprit.jpg" alt="">
<p class="caption">Sweets and Cherries</p>
</li>
<li>
<img src="s.GIF" alt="">
<p class="caption">Fruity Orange Ice Cream</p>
</li>
<li>
<img src="spiritd.jpg" alt="">
<p class="caption">Ice Cream with Fruit Salad</p>
</li>
<li>
<img src="Spirit-2.jpeg" alt="">
<p class="caption">Arabian Sweets and Desserts</p>
</li>
</ul>
</div>
</div>
</body>
</html>
